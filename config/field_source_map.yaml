# ═══════════════════════════════════════════════════════════════════════
# SOURCE METADATA — maps source_id to doc_kinds and execution capability
# Used by gap_resolver to determine what doc_kind to attach
# ═══════════════════════════════════════════════════════════════════════

source_doc_kinds:
  openfda:        [label, us_fda]
  dailymed:       [label]
  drugsatfda:     [approval_letter, complete_response_letter]
  ema_smpc:       [smpc]
  ema_epar:       [epar, assessment_report]
  ema_pil:        [pil]
  grls:           [grls_card, grls]
  grls_instruction: [ru_instruction]
  eaeu_portal:    [eaeu_document]
  ctgov:          [ctgov]
  ctgov_protocol: [ctgov_protocol]
  ctgov_results:  [ctgov_results]
  ctgov_documents: [ctgov_documents]
  ctis:           [ctis]
  pubchem:        [pubchem]
  chembl:         [chembl]
  epo_register:   [patent_family_summary, patent_legal_events, patent_expiry_us]
  orange_book:    [orange_book]
  patent_family_summary: [patent_family_summary]
  pubmed:         [publication, scientific_pdf]
  moa_overview:   [moa_overview]
  drug_monograph: [drug_monograph]
  review_article: [review_article]
  ru_instruction: [ru_instruction]


# ═══════════════════════════════════════════════════════════════════════
# EXECUTION SAFETY — sources that can be auto-attached/fetched in V1
# ═══════════════════════════════════════════════════════════════════════

safe_execution_sources:
  - pubchem
  - chembl
  - ctgov
  - ctgov_protocol
  - ctgov_results
  - ctgov_documents
  - ema_smpc
  - ema_epar
  - ema_pil
  - grls
  - grls_instruction
  - eaeu_portal
  - epo_register
  - orange_book
  - openfda
  - dailymed

# Sources that must NOT auto-execute (web search, press, forums)
unsafe_execution_sources:
  - moa_overview
  - drug_monograph
  - review_article
  - press_release
  - pubmed
  - ctis
