# Field → Source Priority Map — Sprint 22 WS1
# ==============================================
# Maps every dossier field_path to a prioritized source chain.
# Used by gap_resolver.py to build acquisition plans.
#
# Schema per entry:
#   preferred_chain:    ordered list of tier-1 sources to try first
#   fallback_chain:     tier-2 / secondary sources (marked provisional)
#   stop_condition:     when to stop searching
#   allow_provisional:  whether fallback/secondary evidence is acceptable
#   supports_execution: whether gap_resolver can auto-attach/fetch/index
#
# Stop conditions:
#   field_has_value          — any non-null value with evidence
#   found_verified_primary   — value from tier-1 source with evidence
#   study_card_assembled     — all mandatory study card fields filled
#   all_regions_covered      — value present for all required regions
#   family_identified        — at least one patent family with pub number
#   synthesis_extracted      — at least one step with description + reagents

version: "1.0"
updated_at: "2026-04-06"

